<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monster Siren Style Landing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #040506;
      color: #e9eef4;
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 34%, rgba(180, 220, 235, 0.16), transparent 22%),
        radial-gradient(circle at 70% 22%, rgba(255, 255, 255, 0.08), transparent 26%),
        linear-gradient(105deg, #050607 0%, #080a0c 44%, #030405 100%);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.27;
      background-image: radial-gradient(rgba(255,255,255,0.42) 1px, transparent 1px);
      background-size: 7px 7px;
      pointer-events: none;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.22;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .beam {
      position: absolute;
      background: rgba(255,255,255,0.055);
      transform-origin: top center;
      pointer-events: none;
    }

    .beam-1 {
      left: 35%;
      top: -12%;
      width: 8vw;
      height: 120vh;
      transform: rotate(14deg);
    }

    .beam-2 {
      left: 51%;
      top: 34%;
      width: 8vw;
      height: 38vh;
      transform: rotate(-19deg);
    }

    .beam-3 {
      right: 21%;
      top: 31%;
      width: 8vw;
      height: 45vh;
      transform: rotate(-16deg);
    }

    .beam-4 {
      right: -2%;
      top: -8%;
      width: 7vw;
      height: 85vh;
      transform: rotate(-14deg);
    }

    .line {
      position: absolute;
      height: 1px;
      background: rgba(255,255,255,0.13);
      pointer-events: none;
    }

    .line-1 {
      left: 5%;
      top: 48%;
      width: 92%;
      transform: rotate(-7deg);
    }

    .line-2 {
      left: 13%;
      top: 13%;
      width: 68%;
      transform: rotate(4deg);
    }

    .line-3 {
      left: 8%;
      bottom: 20%;
      width: 42%;
      transform: rotate(-3deg);
    }

    .smoke {
      position: absolute;
      left: -8%;
      bottom: -6%;
      width: 55vw;
      height: 45vh;
      opacity: 0.35;
      filter: blur(1px);
      background: linear-gradient(135deg, rgba(220,235,245,0.25), transparent 52%);
      transform: rotate(-8deg);
      pointer-events: none;
    }

    .noise-word {
      position: absolute;
      color: rgba(255,255,255,0.06);
      font-size: 9rem;
      font-weight: 900;
      letter-spacing: -0.09em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .noise-word.one {
      left: 16%;
      top: 8%;
    }

    .noise-word.two {
      right: 4%;
      bottom: 12%;
    }

    header {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 34px 5.2vw;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .logo {
      width: 58px;
      height: 28px;
      display: grid;
      place-items: center;
      background: #dce4eb;
      color: #070809;
      font-size: 22px;
      font-weight: 1000;
      letter-spacing: -9px;
      padding-right: 8px;
    }

    .dotted {
      width: 25vw;
      max-width: 430px;
      border-top: 3px dotted rgba(205,244,255,0.82);
    }

    .tagline {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.86);
    }

    nav {
      display: flex;
      gap: 5.3vw;
      font-size: 15px;
      font-weight: 800;
    }

    nav a {
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    nav a:hover {
      color: #c9f5ff;
      text-shadow: 0 0 12px rgba(180,240,255,0.8);
    }

    .hero {
      position: relative;
      z-index: 4;
      height: calc(100vh - 100px);
      display: flex;
      align-items: center;
      padding: 0 5.2vw;
    }

    .hero-content {
      transform: translateY(-22px);
    }

    .eyebrow {
      margin-bottom: 18px;
      color: #eff9ff;
      font-size: 17px;
      font-weight: 1000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(180,235,255,0.7);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 14px;
    }

    .hero-logo {
      width: 180px;
      height: 78px;
      display: grid;
      place-items: center;
      background: #dce4eb;
      color: #050607;
      font-size: 64px;
      font-weight: 1000;
      letter-spacing: -26px;
      padding-right: 20px;
      box-shadow: 0 0 22px rgba(220,245,255,0.15);
    }

    h1 {
      color: #e6edf4;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: clamp(3.2rem, 7vw, 7.1rem);
      line-height: 0.86;
      letter-spacing: -0.08em;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 4px 0 0 rgba(255,255,255,0.18);
    }

    .chinese-title {
      margin-top: 12px;
      font-size: clamp(2.2rem, 4vw, 4.4rem);
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 900;
      letter-spacing: -0.08em;
      text-shadow: 0 0 16px rgba(255,255,255,0.14);
    }

    .subtitle {
      margin-top: 30px;
      font-size: clamp(1.35rem, 2.2vw, 2.5rem);
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.45em;
      color: rgba(255,255,255,0.95);
    }

    .search-box {
      margin-top: 30px;
      width: min(510px, 82vw);
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 0 26px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(0,0,0,0.82);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 20px rgba(0,0,0,0.7);
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #e8edf2;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    .search-icon {
      position: relative;
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      border: 4px solid rgba(220,230,240,0.9);
      border-radius: 50%;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -8px;
      bottom: -7px;
      width: 12px;
      height: 4px;
      background: rgba(220,230,240,0.9);
      transform: rotate(45deg);
      border-radius: 3px;
    }

    .bottom-text {
      position: absolute;
      left: 5.2vw;
      bottom: 42px;
      z-index: 5;
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      letter-spacing: 1.25em;
    }

    .scroll {
      position: absolute;
      right: 28px;
      bottom: 36px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #f7fbff;
      font-size: 15px;
      font-weight: 1000;
      text-transform: uppercase;
    }

    .scroll::before {
      content: "";
      width: 170px;
      height: 1px;
      background: rgba(255,255,255,0.55);
    }

    .arrows {
      letter-spacing: -2px;
      animation: slide 1.3s infinite ease-in-out;
    }

    @keyframes slide {
      0%, 100% { transform: translateX(0); opacity: 0.5; }
      50% { transform: translateX(8px); opacity: 1; }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .page {
        min-height: 100vh;
        height: auto;
      }

      header {
        padding: 24px;
      }

      nav,
      .dotted,
      .tagline {
        display: none;
      }

      .hero {
        height: auto;
        min-height: calc(100vh - 76px);
        padding: 70px 24px 120px;
      }

      .title-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero-logo {
        width: 144px;
        height: 62px;
        font-size: 48px;
      }

      .subtitle {
        letter-spacing: 0.22em;
        line-height: 1.8;
      }

      .bottom-text {
        left: 24px;
        right: 24px;
        letter-spacing: 0.55em;
        font-size: 10px;
      }

      .scroll {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="beam beam-1"></div>
    <div class="beam beam-2"></div>
    <div class="beam beam-3"></div>
    <div class="beam beam-4"></div>

    <div class="line line-1"></div>
    <div class="line line-2"></div>
    <div class="line line-3"></div>
    <div class="smoke"></div>

    <div class="noise-word one">UNKNOWN</div>
    <div class="noise-word two">SIREN</div>

    <header>
      <div class="brand">
        <div class="logo">MS</div>
        <div class="dotted"></div>
        <p class="tagline">Warm and Small Light</p>
      </div>

      <nav>
        <a href="#">소개</a>
        <a href="#">음악</a>
        <a href="#">소식/동향</a>
        <a href="#">문의하기</a>
        <a href="#">로그인</a>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <p class="eyebrow">WELCOME TO</p>

        <div class="title-row">
          <div class="hero-logo">MS</div>
          <h1>MONSTER SIREN</h1>
        </div>

        <h2 class="chinese-title">세이렌 레코드</h2>
        <p class="subtitle">익숙하지만 낯선 세계</p>

        <form class="search-box">
          <input type="text" placeholder="A WORLD FAMILIARLY UNKNOWN" />
          <span class="search-icon" aria-hidden="true"></span>
        </form>
      </div>
    </section>

    <p class="bottom-text">A WORLD FAMILIARLY UNKNOWN</p>
    <div class="scroll">
      <span>SCROLL</span>
      <span class="arrows">&gt;&gt;&gt;</span>
    </div>
  </div>
</body>
</html>
